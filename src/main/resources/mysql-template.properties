# MySQL 数据库配置
# 数据库连接URL
url = jdbc:mysql://localhost:3306/test
# 数据库用户名
user = root
# 数据库密码
pass = 123456

# 可选配置
# 是否在日志中显示执行的SQL
showSql = true
# 是否格式化显示的SQL
formatSql = false
# 是否显示SQL参数
showParams = true
# 打印SQL的日志等级，默认debug，可以是info、warn、error
sqlLevel = debug

# 连接池配置
# 最小空闲连接数，默认5
minimumIdle = 5
# 最大连接数，默认10
maximumPoolSize = 10
# 连接超时时间（毫秒），默认30000
connectionTimeout = 30000
# 空闲连接超时时间（毫秒），默认600000
idleTimeout = 600000
# 连接最大生存时间（毫秒），默认1800000
maxLifetime = 1800000
# 连接测试查询SQL，默认SELECT 1
connectionTestQuery = SELECT 1
# 是否在获取连接时测试连接有效性，默认true
connectionTestOnBorrow = true
